# sonar.projectKey and sonar.organization are injected via GitHub Actions secrets
# (SONAR_PROJECT_KEY and SONAR_ORG_KEY) — do not hardcode them here.

sonar.projectName=MindReader
sonar.projectVersion=1.0

# Sources
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/tests

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/obj/**,\
  **/bin/**,\
  **/Migrations/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/test/**,\
  **/coverage/**

sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/Tests/**/*.cs

# Frontend coverage (lcov generated by Vitest)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Backend coverage (OpenCover/Cobertura generated by coverlet)
sonar.cs.opencover.reportsPaths=backend/coverage-results/**/coverage.opencover.xml

# Encoding
sonar.sourceEncoding=UTF-8
