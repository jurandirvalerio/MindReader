name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by SonarCloud

      # ── Java (required by SonarScanner for .NET) ────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── .NET ────────────────────────────────────────────────────────────────
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Frontend: install & coverage ────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      # ── Backend: SonarScanner begin ─────────────────────────────────────────
      - name: Install SonarCloud scanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud scan
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORG_KEY }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage-results/**/coverage.opencover.xml" \
            /d:sonar.javascript.lcov.reportPaths="../frontend/coverage/lcov.info" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**" \
            /d:sonar.test.exclusions="**/Tests/**"

      # ── Backend: build & tests with coverage ────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: dotnet build --no-incremental

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          dotnet test tests/MindReader.Tests \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # ── Backend: SonarScanner end ────────────────────────────────────────────
      - name: End SonarCloud scan
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
